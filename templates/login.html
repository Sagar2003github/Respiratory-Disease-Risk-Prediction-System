<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h1>Login</h1>
    <p>Access your AI-powered respiratory health dashboard</p>

    <form method="post">
        <input 
            type="text" 
            name="username" 
            placeholder="Username" 
            required
        >

        <input 
            type="password" 
            name="password" 
            placeholder="Password" 
            required
        >

        <button class="btn" type="submit">Login</button>
    </form>

    <!-- Navigation -->
    <p style="margin-top: 20px;">
        New user? 
        <a href="/signup">Create an account</a>
    </p>
</div>

</body>
</html>
